<!DOCTYPE html>
<html>
<head>
  <title>Biomechanics Pose Tool</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f6f8;
    }

    header {
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #ddd;
      font-size: 22px;
      font-weight: 600;
    }

    .upload-section {
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #0077ff;
      color: white;
      font-weight: 500;
      min-width: 180px;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      padding: 30px;
    }

    .video-wrapper {
      position: relative;
      max-width: 700px;
      width: 100%;
    }

    video {
      width: 100%;
      max-height: 75vh;
      border-radius: 8px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .angle-panel {
      width: 220px;
      min-height: 110px;
      background: white;
      border: 1px solid #dde3ea;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      padding: 14px;
    }

    .angle-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6d7885;
      margin-bottom: 8px;
    }

    .angle-value {
      font-size: 32px;
      font-weight: 700;
      color: #1b2b3b;
      margin-bottom: 4px;
    }

    .angle-note {
      font-size: 13px;
      color: #5f6d7b;
    }

    /* MODEL LOADING OVERLAY */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ddd;
      border-top: 5px solid #0077ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

  </style>
</head>

<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Loading model...</div>
</div>

<header>Biomechanics Pose Tool</header>

<div class="upload-section">
  <input type="file" id="videoUpload" accept="video/*" />
  <button id="exportBtn">Download Annotated Video</button>
</div>

<div class="container">
  <div class="video-wrapper">
    <video id="video" controls></video>
    <canvas id="overlay"></canvas>
  </div>
  <div class="angle-panel">
    <div class="angle-label">Alignment Angle</div>
    <div id="angleValue" class="angle-value">--°</div>
    <div class="angle-note">Measured from ankle midpoint reference line.</div>
  </div>
</div>

<script>

let detector;
let animationId = null;
let isExporting = false;

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d");
const exportBtn = document.getElementById("exportBtn");
const angleValueEl = document.getElementById("angleValue");

const loadingOverlay = document.getElementById("loadingOverlay");
const loadingText = document.getElementById("loadingText");

// Skeleton
const skeleton = [
  ["left_shoulder","left_elbow"],
  ["left_elbow","left_wrist"],
  ["right_shoulder","right_elbow"],
  ["right_elbow","right_wrist"],
  ["left_shoulder","right_shoulder"],
  ["left_shoulder","left_hip"],
  ["right_shoulder","right_hip"],
  ["left_hip","right_hip"],
  ["left_hip","left_knee"],
  ["left_knee","left_ankle"],
  ["right_hip","right_knee"],
  ["right_knee","right_ankle"]
];

async function loadModel() {

  loadingText.innerText = "Loading MoveNet Thunder...";

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_THUNDER }
  );

  loadingText.innerText = "Model Ready ✔";

  setTimeout(()=>{
    loadingOverlay.style.opacity = 0;
    setTimeout(()=>{
      loadingOverlay.style.display = "none";
    }, 400);
  }, 800);

  console.log("Model Loaded ✔");
}

function calculateAngle(A,B,C) {
  const BA = {x:A.x-B.x, y:A.y-B.y};
  const BC = {x:C.x-B.x, y:C.y-B.y};
  const dot = BA.x*BC.x + BA.y*BC.y;
  const magBA = Math.hypot(BA.x,BA.y);
  const magBC = Math.hypot(BC.x,BC.y);
  if(magBA===0 || magBC===0) return 0;
  const cos = dot/(magBA*magBC);
  return Math.acos(Math.min(1,Math.max(-1,cos))) * 180/Math.PI;
}

function updateAngleDisplay(value) {
  angleValueEl.innerText = Number.isFinite(value) ? `${value.toFixed(1)}°` : "--°";
}

async function drawOverlay(targetCtx, fullResolution=false) {

  const poses = await detector.estimatePoses(video);
  if (!poses.length) return;

  const pts = {};

  if (fullResolution) {
    // EXPORT MODE (no scaling needed)
    poses[0].keypoints.forEach(p=>{
      if(p.score > 0.4){
        pts[p.name] = { x: p.x, y: p.y };
      }
    });
  } else {
    // VIEWER MODE (handle portrait letterboxing properly)

    const videoWidth = video.videoWidth;
    const videoHeight = video.videoHeight;

    const elementWidth = video.clientWidth;
    const elementHeight = video.clientHeight;

    const videoAspect = videoWidth / videoHeight;
    const elementAspect = elementWidth / elementHeight;

    let renderWidth, renderHeight;
    let offsetX = 0, offsetY = 0;

    if (videoAspect > elementAspect) {
      // Letterbox top/bottom
      renderWidth = elementWidth;
      renderHeight = elementWidth / videoAspect;
      offsetY = (elementHeight - renderHeight) / 2;
    } else {
      // Letterbox left/right
      renderHeight = elementHeight;
      renderWidth = elementHeight * videoAspect;
      offsetX = (elementWidth - renderWidth) / 2;
    }

    poses[0].keypoints.forEach(p=>{
      if(p.score > 0.4){

        const x =
          (p.x / videoWidth) * renderWidth + offsetX;

        const y =
          (p.y / videoHeight) * renderHeight + offsetY;

        pts[p.name] = { x, y };
      }
    });
  }

  // Skeleton
  skeleton.forEach(([a,b])=>{
    if(pts[a] && pts[b]){
      targetCtx.beginPath();
      targetCtx.moveTo(pts[a].x,pts[a].y);
      targetCtx.lineTo(pts[b].x,pts[b].y);
      targetCtx.strokeStyle="lime";
      targetCtx.lineWidth=3;
      targetCtx.stroke();
    }
  });

  // Joints
  Object.values(pts).forEach(p=>{
    targetCtx.beginPath();
    targetCtx.arc(p.x,p.y,5,0,2*Math.PI);
    targetCtx.fillStyle="red";
    targetCtx.fill();
  });

  const leftAnkle = pts.left_ankle;
  const rightAnkle = pts.right_ankle;

  if (leftAnkle && rightAnkle) {
    const ankleMidpoint = {
      x: (leftAnkle.x + rightAnkle.x) / 2,
      y: (leftAnkle.y + rightAnkle.y) / 2
    };

    const referenceTop = {
      x: ankleMidpoint.x,
      y: ankleMidpoint.y - 140
    };

    targetCtx.beginPath();
    targetCtx.setLineDash([8, 6]);
    targetCtx.moveTo(ankleMidpoint.x, ankleMidpoint.y);
    targetCtx.lineTo(referenceTop.x, referenceTop.y);
    targetCtx.strokeStyle = "#1e78ff";
    targetCtx.lineWidth = 3;
    targetCtx.stroke();
    targetCtx.setLineDash([]);

    const leftHip = pts.left_hip;
    const rightHip = pts.right_hip;

    if (leftHip && rightHip) {
      const hipMidpoint = {
        x: (leftHip.x + rightHip.x) / 2,
        y: (leftHip.y + rightHip.y) / 2
      };

      const alignmentAngle = calculateAngle(referenceTop, ankleMidpoint, hipMidpoint);
      updateAngleDisplay(alignmentAngle);
    } else {
      updateAngleDisplay(NaN);
    }
  } else {
    updateAngleDisplay(NaN);
  }
}


// Real-time loop
async function viewerLoop() {

  if(video.paused || video.ended){
    animationId = null;
    return;
  }

  ctx.clearRect(0,0,overlay.width,overlay.height);
  await drawOverlay(ctx,false);

  animationId = requestAnimationFrame(viewerLoop);
}

video.addEventListener("play", ()=>{
  if(!animationId)
    animationId = requestAnimationFrame(viewerLoop);
});

video.addEventListener("seeked", async ()=>{
  if(video.paused){
    ctx.clearRect(0,0,overlay.width,overlay.height);
    await drawOverlay(ctx,false);
  }
});

video.addEventListener("loadedmetadata",()=>{
  overlay.width = video.clientWidth;
  overlay.height = video.clientHeight;
});

document.getElementById("videoUpload")
.addEventListener("change",e=>{
  video.src = URL.createObjectURL(e.target.files[0]);
});

// EXPORT LOGIC
exportBtn.addEventListener("click", async () => {

  if(!video.src || isExporting) return;

  isExporting = true;
  exportBtn.disabled = true;
  exportBtn.innerText = "Downloading...";

  const exportCanvas = document.createElement("canvas");
  exportCanvas.width = video.videoWidth;
  exportCanvas.height = video.videoHeight;
  const exportCtx = exportCanvas.getContext("2d");

  const stream = exportCanvas.captureStream(30);
  const recorder = new MediaRecorder(stream, { mimeType: "video/webm" });

  const chunks = [];

  recorder.ondataavailable = e=>{
    if(e.data.size>0) chunks.push(e.data);
  };

  recorder.onstop = ()=>{
    const blob = new Blob(chunks,{type:"video/webm"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "annotated_video.webm";
    a.click();

    exportBtn.innerText = "Done ✔";
    setTimeout(()=>{
      exportBtn.innerText = "Download Annotated Video";
      exportBtn.disabled = false;
      isExporting = false;
    },2000);
  };

  recorder.start();

  video.currentTime = 0;
  await video.play();

  const exportLoop = async ()=>{

    if(video.paused || video.ended){
      recorder.stop();
      return;
    }

    exportCtx.drawImage(video,0,0);
    await drawOverlay(exportCtx,true);

    requestAnimationFrame(exportLoop);
  };

  exportLoop();
});

loadModel();

</script>

</body>
</html>

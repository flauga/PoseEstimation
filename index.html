<!DOCTYPE html>
<html>
<head>
  <title>Biomechanics Pose Tool</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f4f6f8;
    }

    header {
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #ddd;
      font-size: 22px;
      font-weight: 600;
    }

    .upload-section {
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #0077ff;
      color: white;
      font-weight: 500;
      min-width: 180px;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #processingStatus {
      font-size: 14px;
      color: #44515f;
      min-height: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 24px;
      padding: 30px;
    }

    .video-wrapper {
      position: relative;
      max-width: 700px;
      width: 100%;
    }

    video {
      width: 100%;
      max-height: 75vh;
      border-radius: 8px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .angle-panel {
      width: 220px;
      min-height: 110px;
      background: white;
      border: 1px solid #dde3ea;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      padding: 14px;
    }

    .angle-label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6d7885;
      margin-bottom: 8px;
    }

    .angle-value {
      font-size: 32px;
      font-weight: 700;
      color: #1b2b3b;
      margin-bottom: 4px;
    }

    .angle-note {
      font-size: 13px;
      color: #5f6d7b;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ddd;
      border-top: 5px solid #0077ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

  </style>
</head>

<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Loading model...</div>
</div>

<header>Biomechanics Pose Tool</header>

<div class="upload-section">
  <input type="file" id="videoUpload" accept="video/*" />
  <button id="exportBtn">Download Annotated Video</button>
  <div id="processingStatus"></div>
</div>

<div class="container">
  <div class="video-wrapper">
    <video id="video" controls></video>
    <canvas id="overlay"></canvas>
  </div>
  <div class="angle-panel">
    <div class="angle-label">Alignment Angle</div>
    <div id="angleValue" class="angle-value">--°</div>
    <div class="angle-note">Measured from ankle midpoint reference line.</div>
  </div>
</div>

<script>

let detector;
let animationId = null;
let isExporting = false;
let isProcessing = false;
let isModelReady = false;

const processedFps = 30;
let processedFrames = [];

const KEYPOINT_NAMES = [
  "nose","left_eye","right_eye","left_ear","right_ear",
  "left_shoulder","right_shoulder","left_elbow","right_elbow",
  "left_wrist","right_wrist","left_hip","right_hip",
  "left_knee","right_knee","left_ankle","right_ankle"
];

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d");
const exportBtn = document.getElementById("exportBtn");
const angleValueEl = document.getElementById("angleValue");
const processingStatus = document.getElementById("processingStatus");
const videoUpload = document.getElementById("videoUpload");
const loadingOverlay = document.getElementById("loadingOverlay");
const loadingText = document.getElementById("loadingText");

const skeleton = [
  ["left_shoulder","left_elbow"],
  ["left_elbow","left_wrist"],
  ["right_shoulder","right_elbow"],
  ["right_elbow","right_wrist"],
  ["left_shoulder","right_shoulder"],
  ["left_shoulder","left_hip"],
  ["right_shoulder","right_hip"],
  ["left_hip","right_hip"],
  ["left_hip","left_knee"],
  ["left_knee","left_ankle"],
  ["right_hip","right_knee"],
  ["right_knee","right_ankle"]
];

async function loadModel() {
  try {
    loadingText.innerText = "Initializing backend...";
    await tf.setBackend("webgl");
    await tf.ready();

    loadingText.innerText = "Loading MoveNet Lightning...";
    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
    );

    isModelReady = true;
    loadingText.innerText = "Model Ready ✔";
    processingStatus.innerText = "Upload a video to begin.";

  } catch (err) {
    console.error(err);
    loadingText.innerText = "Model failed to load.";
    processingStatus.innerText = "Check browser WebGL support.";
  }

  setTimeout(() => {
    loadingOverlay.style.opacity = 0;
    setTimeout(() => loadingOverlay.style.display = "none", 400);
  }, 800);
}

function calculateAngle(A,B,C) {
  const BA = {x:A.x-B.x, y:A.y-B.y};
  const BC = {x:C.x-B.x, y:C.y-B.y};
  const dot = BA.x*BC.x + BA.y*BC.y;
  const magBA = Math.hypot(BA.x,BA.y);
  const magBC = Math.hypot(BC.x,BC.y);
  if(magBA===0 || magBC===0) return NaN;
  const cos = dot/(magBA*magBC);
  return Math.acos(Math.min(1,Math.max(-1,cos))) * 180/Math.PI;
}

function updateAngleDisplay(value) {
  angleValueEl.innerText =
    Number.isFinite(value) ? `${value.toFixed(1)}°` : "--°";
}

function drawOverlayFromFrame(targetCtx, framePts, fullResolution=false) {

  if (!framePts) {
    updateAngleDisplay(NaN);
    return;
  }

  const bounds = fullResolution
    ? {offsetX:0, offsetY:0, renderWidth:video.videoWidth, renderHeight:video.videoHeight}
    : getRenderBounds();

  const pts = fullResolution ? framePts : mapToCanvas(framePts, bounds);

  skeleton.forEach(([a,b])=>{
    if(pts[a] && pts[b]){
      targetCtx.beginPath();
      targetCtx.moveTo(pts[a].x,pts[a].y);
      targetCtx.lineTo(pts[b].x,pts[b].y);
      targetCtx.strokeStyle="lime";
      targetCtx.lineWidth=1.5;
      targetCtx.stroke();
    }
  });

  Object.values(pts).forEach(p=>{
    targetCtx.beginPath();
    targetCtx.arc(p.x,p.y,3,0,2*Math.PI);
    targetCtx.fillStyle="red";
    targetCtx.fill();
  });

  const leftAnkle = pts.left_ankle;
  const rightAnkle = pts.right_ankle;
  const leftHip = pts.left_hip;
  const rightHip = pts.right_hip;

  if (!leftAnkle || !rightAnkle || !leftHip || !rightHip) {
    updateAngleDisplay(NaN);
    return;
  }

  const ankleMid = {
    x:(leftAnkle.x+rightAnkle.x)/2,
    y:(leftAnkle.y+rightAnkle.y)/2
  };

  targetCtx.beginPath();
  targetCtx.setLineDash([8,6]);
  targetCtx.moveTo(ankleMid.x, bounds.offsetY);
  targetCtx.lineTo(ankleMid.x, bounds.offsetY + bounds.renderHeight);
  targetCtx.strokeStyle="#1e78ff";
  targetCtx.lineWidth=2;
  targetCtx.stroke();
  targetCtx.setLineDash([]);

  const hipMid = {
    x:(leftHip.x+rightHip.x)/2,
    y:(leftHip.y+rightHip.y)/2
  };

  const referenceTop = {x:ankleMid.x, y:bounds.offsetY};
  const alignmentAngle = calculateAngle(referenceTop, ankleMid, hipMid);
  updateAngleDisplay(alignmentAngle);
}

function getRenderBounds(){
  const vw=video.videoWidth, vh=video.videoHeight;
  const ew=video.clientWidth, eh=video.clientHeight;
  const va=vw/vh, ea=ew/eh;
  let rw,rh,ox=0,oy=0;

  if(va>ea){
    rw=ew; rh=ew/va;
    oy=(eh-rh)/2;
  } else {
    rh=eh; rw=eh*va;
    ox=(ew-rw)/2;
  }
  return {offsetX:ox, offsetY:oy, renderWidth:rw, renderHeight:rh};
}

function mapToCanvas(framePts,b){
  const mapped={};
  Object.entries(framePts).forEach(([n,p])=>{
    mapped[n]={
      x:(p.x/video.videoWidth)*b.renderWidth+b.offsetX,
      y:(p.y/video.videoHeight)*b.renderHeight+b.offsetY
    };
  });
  return mapped;
}

function getFrameIndex(time){
  return Math.min(
    processedFrames.length-1,
    Math.max(0,Math.round(time*processedFps))
  );
}

async function preprocessCurrentVideo(){
  if(!video.src || !isModelReady) return;

  isProcessing=true;
  processedFrames=[];
  exportBtn.disabled=true;

  video.pause();
  const frameCount=Math.ceil(video.duration*processedFps);

  for(let i=0;i<frameCount;i++){
    const t=i/processedFps;
    await seekVideo(t);

    const poses=await detector.estimatePoses(video);
    const frame={};
    if(poses.length){
      poses[0].keypoints.forEach(p=>{
        if(p.score>0.4)
          frame[p.name]={x:p.x,y:p.y};
      });
    }
    processedFrames.push(frame);
    processingStatus.innerText=`Processing ${i+1}/${frameCount}`;
  }

  await seekVideo(0);
  drawOverlayFromFrame(ctx,processedFrames[0],false);

  exportBtn.disabled=false;
  isProcessing=false;
  processingStatus.innerText="Processing complete.";
}

function seekVideo(t){
  return new Promise(res=>{
    video.addEventListener("seeked",res,{once:true});
    video.currentTime=t;
  });
}

video.addEventListener("play",()=>{
  if(!processedFrames.length) return video.pause();
  if(!animationId)
    animationId=requestAnimationFrame(loop);
});

async function loop(){
  if(video.paused||video.ended) return;
  const frame=processedFrames[getFrameIndex(video.currentTime)];
  ctx.clearRect(0,0,overlay.width,overlay.height);
  drawOverlayFromFrame(ctx,frame,false);
  animationId=requestAnimationFrame(loop);
}

videoUpload.addEventListener("change",async e=>{
  const file=e.target.files[0];
  if(!file) return;
  video.src=URL.createObjectURL(file);
  await new Promise(r=>video.addEventListener("loadedmetadata",r,{once:true}));
  overlay.width=video.clientWidth;
  overlay.height=video.clientHeight;
  await preprocessCurrentVideo();
});

loadModel();

</script>

</body>
</html>
